<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Deshshiksha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', Arial, sans-serif; min-height: 100vh; background: linear-gradient(135deg,#1e40af,#7c3aed,#0891b2); display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: white; border-radius: 24px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 1.8rem; }
        .logo .logo-icon { font-size: 2.8rem; display: block; margin-bottom: 0.3rem; }
        .logo h1 { font-size: 1.6rem; font-weight: 800; color: #1e293b; }
        .logo p  { font-size: 0.85rem; color: #94a3b8; margin-top: 3px; }
        .step-hint { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 8px 12px; font-size: 0.8rem; color: #0369a1; margin-bottom: 1.4rem; text-align: center; }
        .form-group { margin-bottom: 1.1rem; }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: #475569; margin-bottom: 5px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s; color: #1e293b; }
        input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .field-errors { list-style: none; padding: 0; margin-top: 4px; }
        .field-errors li { font-size: 0.78rem; color: #dc2626; font-weight: 500; }
        .btn-register { width: 100%; padding: 13px; background: linear-gradient(135deg,#4f46e5,#7c3aed); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(99,102,241,0.35); transition: transform 0.15s; margin-top: 0.6rem; }
        .btn-register:hover { transform: translateY(-2px); }
        .divider { text-align: center; color: #cbd5e1; font-size: 0.82rem; margin: 1.2rem 0; }
        .link-row { text-align: center; font-size: 0.88rem; color: #64748b; }
        .link-row a { color: #4f46e5; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="logo-icon">🎓</span>
            <h1>Deshshiksha</h1>
            <p>Create your account</p>
        </div>
        <div class="step-hint">Step 1 of 2 — Create your login credentials</div>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <ul class="field-errors">{% for error in field.errors %}<li>{{ error }}</li>{% endfor %}</ul>
                {% endif %}
            </div>
            {% endfor %}
            <button class="btn-register" type="submit">Create Account</button>
        </form>
        <div class="divider">or</div>
        <div class="link-row">Already have an account? <a href="/users/login/">Login</a></div>
    </div>
</body>
</html>
