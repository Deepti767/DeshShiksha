<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Cognitive</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0fbf4; min-height: 100vh; }
        header { background: #1a7a3f; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header a { color: white; text-decoration: none; font-size: 0.9rem; }
        .content { padding: 2rem; max-width: 600px; margin: 0 auto; }
        h2 { color: #1a7a3f; margin-bottom: 1.5rem; }
        .question-box { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .question-box p { font-size: 1.1rem; color: #333; margin-bottom: 1rem; }
        .options { display: flex; flex-direction: column; gap: 0.6rem; }
        .options label { display: flex; align-items: center; gap: 0.6rem; background: #f0fbf4; padding: 10px 14px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
        .options label:hover { background: #d5f0e0; }
        button { margin-top: 1rem; padding: 10px 24px; background: #1a7a3f; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #145f30; }
    </style>
</head>
<body>
    <header>
        <h1>Quiz</h1>
        <a href="/users/dashboard/cognitive/">Back to Dashboard</a>
    </header>
    <div class="content">
        <h2>Fun Learning Quiz</h2>
        <form>
            <div class="question-box">
                <p>1. 🍎 Apple starts with which letter?</p>
                <div class="options">
                    <label><input type="radio" name="q1"> A</label>
                    <label><input type="radio" name="q1"> B</label>
                    <label><input type="radio" name="q1"> C</label>
                    <label><input type="radio" name="q1"> D</label>
                </div>
            </div>
            <div class="question-box">
                <p>2. How many fingers am I showing? ✌️</p>
                <div class="options">
                    <label><input type="radio" name="q2"> 1</label>
                    <label><input type="radio" name="q2"> 2</label>
                    <label><input type="radio" name="q2"> 3</label>
                    <label><input type="radio" name="q2"> 4</label>
                </div>
            </div>
            <button type="submit">Submit Quiz</button>
        </form>
    </div>
</body>
</html>
